name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run fixtures:validate
      - run: npm run pack:smoke
      - run: npm run ananke:consumer
      - run: npm run package:verify
      - run: git diff --check
